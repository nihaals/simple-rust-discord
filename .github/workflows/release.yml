name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  INTERNAL_DOCKER_IMAGE_NAME: ghcr.io/${{ github.repository }}/simple-rust-discord

jobs:
  docker-build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
            arch: arm64
    name: Build and push by digest - ${{ matrix.platform }}
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest-amd64: ${{ steps.output-digest.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.output-digest.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.platform }} by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.INTERNAL_DOCKER_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Output digest
        id: output-digest
        run: |
          echo "digest-${{ matrix.arch }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  docker-manifest:
    runs-on: ubuntu-latest
    name: Create and push multi-arch manifest
    needs: docker-build
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.INTERNAL_DOCKER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}}
      - name: Create and push manifest list
        env:
          IMAGE_NAME: ${{ env.INTERNAL_DOCKER_IMAGE_NAME }}
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST_AMD64: ${{ needs.docker-build.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ needs.docker-build.outputs.digest-arm64 }}
        run: |
          TAGS=$(printf -- "-t %s " $TAGS)
          docker buildx imagetools create \
            $TAGS \
            $IMAGE_NAME@$DIGEST_AMD64 \
            $IMAGE_NAME@$DIGEST_ARM64
